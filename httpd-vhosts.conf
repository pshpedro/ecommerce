
<VirtualHost *:8080>
    ServerAdmin webmaster@hcode.com.br
    DocumentRoot "C:/wamp64/www/udemy/CursoCompletoPhp7/ecommerce"
    ServerName www.hcodecommerce.com.br:8080
    ErrorLog "logs/dummy-host2.example.com-error.log"
    CustomLog "logs/dummy-host2.example.com-access.log" common
    <Directory "C:/wamp64/www/udemy/CursoCompletoPhp7/ecommerce">
        Require all granted

        RewriteEngine On

        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [QSA,L]
    </Directory>
</VirtualHost>